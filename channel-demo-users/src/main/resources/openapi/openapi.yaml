openapi: 3.0.3
info:
  title: Users API
  version: 1.0.0
  description: API para consultar usuarios protegida con JWT

servers:
  - url: https://api.example.com

tags:
  - name: Users
    description: Operaciones sobre usuarios

security:
  - bearerAuth: []

paths:
  /users:
    get:
      tags:
        - Users
      summary: Listar usuarios
      operationId: listUsers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

        '401':
          description: Token inválido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{id}:
    get:
      tags:
        - Users
      summary: Obtener usuario por ID
      operationId: getUserById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID del usuario
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

        '401':
          description: Token inválido o ausente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      required:
        - id
        - name
        - username
        - email
        - address
        - phone
        - website
        - company
      properties:
        id:
          type: integer
          format: int32
          example: 1
        name:
          type: string
          example: Leanne Graham
        username:
          type: string
          example: Bret
        email:
          type: string
          format: email
          example: Sincere@april.biz
        address:
          $ref: '#/components/schemas/Address'
        phone:
          type: string
          example: 1-770-736-8031 x56442
        website:
          type: string
          example: hildegard.org
        company:
          $ref: '#/components/schemas/Company'

    Address:
      type: object
      required:
        - street
        - suite
        - city
        - zipcode
        - geo
      properties:
        street:
          type: string
        suite:
          type: string
        city:
          type: string
        zipcode:
          type: string
        geo:
          $ref: '#/components/schemas/Geo'

    Geo:
      type: object
      required:
        - lat
        - lng
      properties:
        lat:
          type: string
        lng:
          type: string

    Company:
      type: object
      required:
        - name
        - catchPhrase
        - bs
      properties:
        name:
          type: string
        catchPhrase:
          type: string
        bs:
          type: string

    Error:
      type: object
      properties:
        message:
          type: string
          example: Token inválido o ausente